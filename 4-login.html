<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="data-tracker.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件A - 登录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-page">
        <!-- 左上角关闭按钮 -->
        <div class="close-btn" onclick="goBack()">×</div>

        <!-- 标题区域 -->
        <div class="login-header">
            <h1 class="login-title">新用户注册登录</h1>
            <p class="login-subtitle">未注册的手机号验证通过后将自动注册</p>
        </div>

        <!-- 用户名输入区域 -->
        <div class="input-group username-group">
            <input type="text" id="usernameInput" class="username-input" placeholder="请输入用户名" maxlength="20">
        </div>
        <!-- 手机号输入区域 -->
        <div class="input-group phone-group">
            <span class="phone-prefix">+86</span>
            <input type="tel" id="phoneInput" class="phone-input" placeholder="请输入手机号" maxlength="11" inputmode="numeric">
        </div>

        <!-- 验证码输入区域 -->
        <div class="input-group code-group">
            <input type="text" id="codeInput" class="code-input" placeholder="请输入验证码" maxlength="4" inputmode="numeric">
        </div>

        <!-- 协议勾选区域 -->
        <div class="agreement-group">
            <input type="checkbox" id="agreementCheck" class="agreement-checkbox">
            <label for="agreementCheck" class="agreement-text">
                我们的服务依赖于使用软件A账号登录，请阅读并同意
                <a href="javascript:void(0)" class="agreement-link">《用户登录指引协议》</a>
            </label>
        </div>

        <!-- 操作按钮 -->
        <button class="action-btn" id="actionBtn" onclick="handleAction()">获取验证码</button>
    </div>



    <!-- 顶部短信通知弹窗 -->
    <div class="notification" id="smsNotification">
        【软件A】用户注册登录验证码 8866，5分钟内有效。
    </div>

    <!-- 错误提示弹窗 -->
    <div class="error-toast" id="errorToast"></div>
<script> 
    // 页面加载完成，开始记录第四页停留时间
    window.onload = function() {
        startPageTimer('page4');
    };

    // 页面关闭/跳走时，兜底记录停留时间
    window.onbeforeunload = function() {
        endPageTimer('page4');
    };
</script>


    <script src="script.js"></script>
</body>
</html>
