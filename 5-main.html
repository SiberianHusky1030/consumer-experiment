            // 点赞/收藏本地存储及初始化逻辑已移除

            // ========== 3. 渲染当前视频 ==========
            function renderVideo(index) {
                const video = videoList[index];
                currentVideoId = video.id;
                // 更新视频源
                videoPlayer.src = video.src;
                videoPlayer.load();
                // 自动播放（处理浏览器策略）
                videoPlayer.play().then(() => {
                    isPlaying = true;
                    pauseIcon.style.display = 'none';
                }).catch(err => {
                    console.log("自动播放需用户交互：", err);
                    isPlaying = false;
                    pauseIcon.style.display = 'block';
                });
                // 更新视频信息
                // 右侧交互栏相关DOM操作已移除
                document.getElementById('page5-authorNick').innerText = video.nick;
                document.getElementById('page5-videoDesc').innerText = video.desc;
            }

            // ========== 4. 视频暂停/播放逻辑 ==========
function togglePlay() {
    if (isPlaying) {
        videoPlayer.pause();
        pauseIcon.style.display = 'block';
        isPlaying = false;
    } else {
        videoPlayer.play();
        pauseIcon.style.display = 'none';
        isPlaying = true;
    }
}
// 单击视频触发暂停/播放（手机端兼容优化）
videoWrapper.addEventListener('click', function(e) {
    // 排除点击右侧交互栏 + 修复手机端点击穿透问题
    if (e.target.closest('.page5-right-bar') || e.target.closest('.page5-top-nav') || e.target.closest('.page5-bottom-nav')) {
        return;
    }
    // 防止手机端事件冒泡，强制触发播放/暂停
    e.preventDefault();
    togglePlay();
});
// 额外兼容：手机端触摸事件（部分浏览器click失效时备用）
videoWrapper.addEventListener('touchend', function(e) {
    if (e.target.closest('.page5-right-bar') || e.target.closest('.page5-top-nav') || e.target.closest('.page5-bottom-nav')) {
        return;
    }
    e.preventDefault();
    togglePlay();
});



// 点赞/收藏相关交互与逻辑已全部移除

          
            // ========== 7. 无缝滑动切换视频 ==========
            // 触摸开始
            videoWrapper.addEventListener('touchstart', function(e) {
                startY = e.touches[0].clientY;
                isDragging = true;
                videoWrapper.style.transition = 'none'; // 取消过渡，实时跟随
            });
            // 触摸移动
            videoWrapper.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                moveY = e.touches[0].clientY;
                const diff = moveY - startY;
                // 实时拖动效果（抖音式）
                videoWrapper.style.transform = `translateY(${diff}px)`;
                // 限制拖动距离
                if (Math.abs(diff) > 200) {
                    videoWrapper.style.transform = `translateY(${Math.sign(diff) * 200}px)`;
                }
            });
            // 触摸结束
            videoWrapper.addEventListener('touchend', function(e) {
                isDragging = false;
                videoWrapper.style.transition = 'transform 0.3s ease-out'; // 恢复过渡
                const diff = e.changedTouches[0].clientY - startY;
                // 上滑（手指从下往上）→ 下一个视频
                if (diff < -50) {
                    currentIndex = (currentIndex + 1) % 10;
                    renderVideo(currentIndex);
                }
                // 下滑（手指从上往下）→ 上一个视频
                else if (diff > 50) {
                    currentIndex = (currentIndex - 1 + 10) % 10;
                    renderVideo(currentIndex);
                }
                // 回弹
                videoWrapper.style.transform = 'translateY(0px)';
            });

            // ========== 8. 初始化 ==========
            renderVideo(currentIndex);
        });

        // ========== 新增：横竖屏切换适配 ==========
function adaptVideoSize() {
    // 强制视频重绘，适配新的屏幕尺寸
    const videoPlayer = document.getElementById('page5-videoPlayer');
    const currentSrc = videoPlayer.src;
    videoPlayer.src = currentSrc;
    videoPlayer.load();
    // 保持播放状态
    if (isPlaying) {
        videoPlayer.play().catch(() => {});
    }
}

// 监听屏幕旋转事件
window.addEventListener('orientationchange', adaptVideoSize);
// 监听窗口大小变化（PC端调试）
window.addEventListener('resize', adaptVideoSize);
